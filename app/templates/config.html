<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>👤 Mi Perfil</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <h2>👤 Mi Perfil</h2>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST" enctype="multipart/form-data">
    <label for="profile_picture">📸 Foto de perfil:</label>

    {% if user.profile_picture %}
      <img src="{{ url_for('static', filename='profile_pics/' ~ user.profile_picture) }}" class="profile">
    {% else %}
      <div class="profile-placeholder">👤</div>
    {% endif %}

    <label class="upload-btn">
      📁 Subir foto de perfil
      <input type="file" name="profile_picture" accept="image/*" hidden>
    </label>

    <label for="bio">📝 Bio:</label>
    <textarea 
      id="bio" 
      name="bio" 
      rows="4"
      placeholder="Contanos algo de vos..."
      spellcheck="true"
      autocorrect="on"
    >{{ user.bio }}</textarea>

    <button type="submit">💾 Guardar cambios</button>
  </form>

  <p><a href="{{ url_for('home.home') }}">Volver al inicio</a></p>

  <script>
    // Validación de la bio
    document.querySelector('form').addEventListener('submit', function(event) {
      const bio = document.getElementById('bio').value.trim();
      if (bio.length > 500) {
        event.preventDefault();
        alert('La bio no puede exceder los 500 caracteres.');
      }
    });
  </script>
</body>
</html>
